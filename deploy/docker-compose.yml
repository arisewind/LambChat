services:
  redis:
    image: redis:alpine
    container_name: lambchat-redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:8.2.5
    container_name: lambchat-mongodb
    restart: always
    command: mongod --wiredTigerCacheSizeGB 0.5
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  lambchat:
    container_name: lambchat
    image: ghcr.io/yanyutin753/lambchat:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongodb:27017
      - LLM_MODEL_CACHE_SIZE=${LLM_MODEL_CACHE_SIZE:-50}
      - SESSION_MAX_EVENTS_PER_TRACE=${SESSION_MAX_EVENTS_PER_TRACE:-10000}
      - LOG_LEVEL=INFO
      - ENABLE_MESSAGE_HISTORY=true
      - EVENT_MERGE_INTERVAL=60
    volumes:
      - lamb-data:/app/data
      - ./workspace:/app/workspace
      - ./uploads:/app/uploads

volumes:
  redis-data:
  mongodb-data:
  lamb-data:
