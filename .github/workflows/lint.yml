name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.pre-commit-config.yaml'
      - '.github/workflows/lint.yml'
      - 'main.py'
      - 'run.py'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.pre-commit-config.yaml'
      - '.github/workflows/lint.yml'
      - 'main.py'
      - 'run.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Python formatting and linting with ruff
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Ruff check
        run: uv run ruff check src/

      - name: Run Ruff format
        run: uv run ruff format --check src/

  # Type checking for backend
  mypy:
    name: MyPy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run MyPy
        run: uv run mypy src/

  # Full backend test suite
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run backend tests
        run: uv run pytest

  # Prevent bulky generated artifacts and oversized source files
  large-files:
    name: Large File Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check tracked file sizes
        shell: bash
        run: |
          max_bytes=$((5 * 1024 * 1024))
          failed=0
          while IFS= read -r -d '' file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt "$max_bytes" ]; then
              printf 'Tracked file exceeds 5 MiB: %s (%s bytes)\n' "$file" "$size"
              failed=1
            fi
          done < <(git ls-files -z)
          exit "$failed"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Check files over 1000 lines
        run: pnpm run find-large-files
        working-directory: frontend

  # Lint for frontend
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run ESLint
        run: pnpm run lint
        working-directory: frontend

  # Frontend test suite
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run frontend tests
        run: pnpm test
        working-directory: frontend
